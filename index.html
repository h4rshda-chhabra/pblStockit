<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockIt AI | Next-Gen Intelligence</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            background: radial-gradient(circle at top, #0A1128 0%, #020408 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: rgba(15, 20, 30, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 600px;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h1 {
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 60%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #e2e8f0;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .status-badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .cta-btn {
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            transition: all 0.3s;
        }
        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">GitHub Pages Live Deploy</div>
        <h1>StockIt AI</h1>
        <p>The Python ML engine and dynamic UI are built with Streamlit. Since GitHub Pages natively hosts static assets only, this portal serves as the root gateway.</p>
        <a href="https://github.com/h4rshda-chhabra/pblStockit" class="cta-btn">View Repository</a>
    </div>
</body>
</html>
